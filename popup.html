<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anti Script Extension</title>
  <style>
    body {
      margin: 0;
      height: 550px;
      border-radius: 12px;
      width: 550px;
      padding: 0;
      text-align: center;
      color: #0464eb;
      font-family: Arial, sans-serif;
      background-color: #343c46;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .wallpaper {
      position: absolute;
      inset: 0;
      right: 70px;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      pointer-events: none;
    }

    .riskbox {
      position: absolute;
      bottom: 380px;
      left: 50%;
      transform: translateX(-50%);
      border-color: #ffffff;
      border-style: solid;
      border-radius: 12px;
      height: 100px;
      width: 400px;
      margin: 0px;
      box-sizing: border-box;
      z-index: 1;
      opacity: 0.5;
    }
    .alertbox {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      border-color: #ffffff;
      border-style: solid;
      border-radius: 12px;
      height: 300px;
      width: 400px;
      margin: 0px;
      box-sizing: border-box;
      z-index: 1;
      opacity: 0.5;
    }
    .alert-line {
    position: absolute;
    opacity: 0.5;
    top: 20px;
    left: 0;
    width: 100%;
    height: 2px;
    background-color: #ffffff;
    box-sizing: border-box;
  }
  
  .risk-line {
    position: absolute;
    opacity: 0.5;
    top: 20px;
    left: 0;
    width: 100%;
    height: 2px;
    background-color: #ffffff;
    box-sizing: border-box;
  }
    .alerttext {
      position: absolute;
      bottom: 350px;
      left: 26%;
      transform: translateX(-50%);
      font-size: 14px;
      font-weight: bold;
      color: #ffffff;
      z-index: 2;
    }
    
    .risktext {
      position: absolute;
      bottom: 460px;
      left: 26%;
      transform: translateX(-50%);
      font-size: 14px;
      font-weight: bold;
      color: #ffffff;
      z-index: 2;
    }

    .header {
      position: relative;
      z-index: 2;
      width: fit-content;
      max-width: none;
      margin: 12px auto 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0;
    }

    .logo {
      width: 35px;
      height: 35px;
      border-radius: 8px;
      margin: 0;
    }

    .logo-place {
      position: relative;
      z-index: 1;
      top: 0px;
      margin: 0;
    }

    .icon-name {
      padding: 0;
      font-family: 'JungleFever', Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.6px;
      display: inline-block;
    }

    .icon-name .script {
      color: #ffffff;    }

    .icon-name .sniffer {
      color: #2075e6;    }
    
    .settings-icon {
      position: absolute;
      bottom: 15px;
      right: 200px;
      z-index: 2;
      background: transparent;
      border: none;
      color: #ffffffff;
      font-size: 20px;
      cursor: pointer;
      opacity: 0.7;
    }
    .dashboard-icon {
      position: absolute;
      bottom: 15px;
      left: 180px;
      z-index: 2;
      background: transparent;
      border: none;
      color: #ffffffff;
      font-size: 20px;
      cursor: pointer;
      opacity: 0.7;
    }
  .setext {
    font-size: 12px;
    font: arial, sans-serif;
    color: #ffffff;
    margin-top: 4px;
  }
  
  </style>
</head>

<body>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <img src="icons/wallpaper.jpeg" class="wallpaper">
  <div class="riskbox">
    <div class="risk-line"></div>
  </div>
  <div class="alertbox">
    <div class="alert-line"></div>
  </div>
  <div class="header">
    <div class="logo-place">
      <img src="icons/icon1024.png" alt="Anti Script Extension Logo" class="logo">
    </div>
    <div class="icon-name"><span class="script">Script</span><span class="sniffer">Sniffer</span></div>
  </div>
  <div class="risktext">Risk Assessment</div>
  <div class="alerttext">Alerts & Warnings</div>
  <button class="settings-icon"> 
        <i class=" bi bi-gear-wide-connected"></i> 
        <div class="setext">Settings</div>
  </button>
  <button class="dashboard-icon"> 
        <i class="bi bi-layout-text-window-reverse"></i>
        <div class="setext">Dashboard</div>
  </button>

</body>
</html>
