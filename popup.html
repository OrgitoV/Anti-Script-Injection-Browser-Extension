<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anti Script Extension</title>
  <link rel="stylesheet" href="popup.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 550px;
      border-radius: 12px;
      width: 550px;
      padding: 0;
      text-align: center;
      color: #0464eb;
      font-family: Arial, sans-serif;
      background-color: #343c46;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }

    .wallpaper {
      position: absolute;
      inset: 0;
      right: 70px;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      pointer-events: none;
      opacity: 0.55;
    }

    .riskbox {
      position: absolute;
      top: 78px;
      left: 50%;
      transform: translateX(-50%);
      border-color: rgba(255, 255, 255, 0.34);
      border-style: solid;
      border-radius: 12px;
      height: 118px;
      width: 400px;
      margin: 0px;
      box-sizing: border-box;
      z-index: 1;
      background: linear-gradient(180deg, rgba(14, 22, 33, 0.78) 0%, rgba(14, 22, 33, 0.52) 100%);
      backdrop-filter: blur(4px);
      padding: 36px 18px 14px;
    }

    .alertbox {
      position: absolute;
      top: 214px;
      left: 50%;
      transform: translateX(-50%);
      border-color: rgba(255, 255, 255, 0.34);
      border-style: solid;
      border-radius: 12px;
      height: 272px;
      width: 400px;
      margin: 0px;
      box-sizing: border-box;
      z-index: 1;
      background: linear-gradient(180deg, rgba(14, 22, 33, 0.78) 0%, rgba(14, 22, 33, 0.52) 100%);
      backdrop-filter: blur(4px);
      padding: 36px 16px 16px;
    }

    .alert-line {
      position: absolute;
      opacity: 0.5;
      top: 30px;
      left: 16px;
      width: calc(100% - 32px);
      height: 1px;
      background-color: #ffffff;
      box-sizing: border-box;
    }
  
    .risk-line {
      position: absolute;
      opacity: 0.5;
      top: 30px;
      left: 16px;
      width: calc(100% - 32px);
      height: 1px;
      background-color: #ffffff;
      box-sizing: border-box;
    }

    .alerttext {
      position: absolute;
      top: 10px;
      left: 18px;
      transform: none;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
      z-index: 2;
    }
    
    .risktext {
      position: absolute;
      top: 10px;
      left: 18px;
      transform: none;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #ffffff;
      z-index: 2;
    }

    .header {
      position: relative;
      z-index: 2;
      width: fit-content;
      margin: 12px auto 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      margin: 0;
      display: block;
    }

    .logo-place {
      position: relative;
      z-index: 1;
      top: 0px;
      margin: 0;
      padding: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
    }

    .icon-name {
      padding: 0;
      font-family: Arial, sans-serif;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 0.06em;
      display: inline-flex;
      align-items: baseline;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.24);
    }

    .icon-name .script {
      color: #ffffff;
    }

    .icon-name .sniffer {
      color: #65a9ff;
      margin-left: 4px;
    }

    .brand-subtitle {
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.62);
      margin-top: 1px;
      text-align: left;
    }

    .brand-copy {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    
    .settings-icon {
      position: absolute;
      bottom: 15px;
      right: 200px;
      z-index: 2;
      background: transparent;
      border: none;
      color: #ffffffff;
      font-size: 20px;
      cursor: pointer;
      opacity: 0.7;
    }
    .dashboard-icon {
      position: absolute;
      bottom: 15px;
      left: 180px;
      z-index: 2;
      background: transparent;
      border: none;
      color: #ffffffff;
      font-size: 20px;
      cursor: pointer;
      opacity: 0.7;
    }
  .setext {
    font-size: 12px;
    font-family: Arial, sans-serif;
    color: #ffffff;
    margin-top: 4px;
  }

  .risk-summary {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    margin-top: 2px;
  }

  #risk-score {
    font-size: 38px;
    font-weight: 800;
    line-height: 1;
    color: #2ecc71;
  }

  #risk-label {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #2ecc71;
  }

  .risk-meter {
    position: relative;
    z-index: 2;
    margin-top: 10px;
    width: 100%;
    height: 10px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.2);
    overflow: hidden;
  }

  #risk-bar {
    width: 0%;
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #2ecc71 0%, #5ce091 100%);
    transition: width 0.2s ease, background 0.2s ease;
  }

  #alert-list {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 8px;
    height: 212px;
    overflow-y: auto;
    padding-right: 4px;
    margin-top: 2px;
  }

  #alert-list::-webkit-scrollbar {
    width: 6px;
  }

  #alert-list::-webkit-scrollbar-thumb {
    background: rgba(255, 255, 255, 0.25);
    border-radius: 999px;
  }

  .alert-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    border-radius: 10px;
    border: 1px dashed rgba(255, 255, 255, 0.22);
    background: rgba(255, 255, 255, 0.04);
    color: #ffffff;
    font-size: 13px;
  }

  .alert-item {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    background: rgba(7, 18, 31, 0.5);
    text-align: left;
  }

  .alert-copy {
    min-width: 0;
  }

  .alert-head {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .alert-title {
    font-size: 12px;
    font-weight: 700;
    color: #ffffff;
  }

  .alert-context {
    margin-top: 6px;
    font-size: 11px;
    line-height: 1.35;
    color: rgba(255, 255, 255, 0.88);
  }

  .alert-meta {
    margin-top: 6px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    font-size: 10px;
    color: rgba(255, 255, 255, 0.68);
  }

  .alert-score {
    min-width: 50px;
    padding: 6px 8px;
    border-radius: 10px;
    text-align: center;
    font-size: 14px;
    font-weight: 800;
    border: 1px solid transparent;
  }

  .alert-score.low {
    color: #2ecc71;
    background: rgba(46, 204, 113, 0.18);
    border-color: rgba(46, 204, 113, 0.28);
  }

  .alert-score.medium {
    color: #f1c40f;
    background: rgba(241, 196, 15, 0.18);
    border-color: rgba(241, 196, 15, 0.28);
  }

  .alert-score.high {
    color: #f39c12;
    background: rgba(243, 156, 18, 0.18);
    border-color: rgba(243, 156, 18, 0.28);
  }

  .alert-score.critical {
    color: #e74c3c;
    background: rgba(231, 76, 60, 0.18);
    border-color: rgba(231, 76, 60, 0.28);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 3px 7px;
    border-radius: 999px;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .badge.block {
    color: #ff9b91;
    background: rgba(231, 76, 60, 0.16);
  }

  .badge.warn {
    color: #f7cf63;
    background: rgba(241, 196, 15, 0.14);
  }
  
  </style>
</head>

<body>
  <img src="icons/wallpaper.jpeg" class="wallpaper">
  <div class="riskbox">
    <div class="risktext">Risk Assessment</div>
    <div class="risk-line"></div>
    <div class="risk-summary">
      <div id="risk-score">0</div>
      <div id="risk-label">SAFE</div>
    </div>
    <div class="risk-meter">
      <div id="risk-bar"></div>
    </div>
  </div>
  <div class="alertbox">
    <div class="alerttext">Alerts & Warnings</div>
    <div class="alert-line"></div>
    <div id="alert-list"></div>
  </div>
  <div class="header">
    <div class="logo-place">
      <img src="icons/icon1024.png" alt="Anti Script Extension Logo" class="logo">
    </div>
    <div class="brand-copy">
      <div class="icon-name"><span class="script">Script</span><span class="sniffer">Sniffer</span></div>
      <div class="brand-subtitle">Runtime Threat Monitor</div>
    </div>
  </div>
    <button id="settings-btn" class="settings-icon"> 
        <i class=" bi bi-gear-wide-connected"></i> 
        <div class="setext">Settings</div>
  </button>
    <button id="dashboard-btn" class="dashboard-icon"> 
        <i class="bi bi-layout-text-window-reverse"></i>
        <div class="setext">Dashboard</div>
  </button>

  <script src="popup.js"></script>
</body>
</html>
