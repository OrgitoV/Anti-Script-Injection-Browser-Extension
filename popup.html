<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anti Script Extension</title>
  <style>
    body {
      margin: 0;
      height: 550px;
      border-radius: 12px;
      width: 550px;
      padding: 0;
      text-align: center;
      color: #0464eb;
      font-family: Arial, sans-serif;
      background-color: #343c46;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    .innerbox {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid #ffffff;
      border-style: solid;
      border-radius: 12px;
      height: 46px;
      width: 220px;
      margin: 0px;
      box-sizing: border-box;
      box-shadow: 0 0 7px rgb(244, 244, 244);
    }

    .header {
      position: relative;
      z-index: 1;
      width: fit-content;
      max-width: none;
      margin: 12px auto 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0;
    }

    .logo {
      width: 35px;
      height: 35px;
      border-radius: 8px;
      margin: 0;
    }

    .logo-place {
      position: relative;
      z-index: 1;
      top: 0px;
      margin: 0;
    }

    .icon-name {
      padding: 0;
      font-family: 'JungleFever', Arial, sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.6px;
      display: inline-block;
    }

    .icon-name .script {
      color: #ffffff;    }

    .icon-name .sniffer {
      color: #2075e6;    }
  </style>
</head>

<body>
  <div class="innerbox"></div>
  <div class="header">
    <div class="logo-place">
      <img src="icons/icon1024.png" alt="Anti Script Extension Logo" class="logo">
    </div>
    <div class="icon-name"><span class="script">Script</span><span class="sniffer">Sniffer</span></div>
  </div>
</body>
</html>
